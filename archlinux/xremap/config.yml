# xremap configuration for Arch Linux
# Mirrors Karabiner configuration from macOS

# Timeout for hold vs tap detection (in milliseconds)
# Matches Karabiner's basic.to_if_alone_timeout_milliseconds: 200
default_mode: default

modmap:
  # Caps Lock -> Ctrl when held, Esc when tapped
  - name: Caps Lock to Ctrl/Esc
    remap:
      CapsLock:
        held: Ctrl_L
        alone: Esc
        alone_timeout_millis: 200

  # Tab -> Hyper when held, Tab when tapped
  # Note: Hyper is implemented as Shift+Ctrl+Alt+Super
  - name: Tab to Hyper/Tab
    remap:
      Tab:
        held: [Shift_L, Ctrl_L, Alt_L, Super_L]
        alone: Tab
        alone_timeout_millis: 200

keymap:
  # Hyper Key base layer - Navigation with hjkl
  - name: Hyper + hjkl -> Arrow keys
    remap:
      Shift-Ctrl-Alt-Super-h: Left
      Shift-Ctrl-Alt-Super-j: Down
      Shift-Ctrl-Alt-Super-k: Up
      Shift-Ctrl-Alt-Super-l: Right

  # Hyper + Mission Control and Desktop switching
  - name: Hyper + Desktop controls
    remap:
      Shift-Ctrl-Alt-Super-m: Ctrl-Up  # Mission Control
      Shift-Ctrl-Alt-Super-comma: Ctrl-Left  # Move left a space
      Shift-Ctrl-Alt-Super-dot: Ctrl-Right  # Move right a space

      # Switch to Desktop 1-9
      Shift-Ctrl-Alt-Super-Key_1: Ctrl-Key_1
      Shift-Ctrl-Alt-Super-Key_2: Ctrl-Key_2
      Shift-Ctrl-Alt-Super-Key_3: Ctrl-Key_3
      Shift-Ctrl-Alt-Super-Key_4: Ctrl-Key_4
      Shift-Ctrl-Alt-Super-Key_5: Ctrl-Key_5
      Shift-Ctrl-Alt-Super-Key_6: Ctrl-Key_6
      Shift-Ctrl-Alt-Super-Key_7: Ctrl-Key_7
      Shift-Ctrl-Alt-Super-Key_8: Ctrl-Key_8
      Shift-Ctrl-Alt-Super-Key_9: Ctrl-Key_9

  # Hyper + e sublayer - Application launching
  - name: Hyper + e sublayer
    remap:
      # Toggle sublayer e (held)
      Shift-Ctrl-Alt-Super-e:
        launch: ["sh", "-c", "sleep 0.2"]  # Small delay for sublayer activation

      # Within e sublayer - App launchers
      # Note: These require a two-step process in xremap
      # You'll need to press Hyper+e, then the key

  # Simplified app launchers (direct Hyper combinations)
  # Since xremap doesn't support sublayers like Karabiner, we use longer combos
  - name: Application launchers
    remap:
      Shift-Ctrl-Alt-Super-Shift-j: { launch: ["brave"] }  # Browser
      Shift-Ctrl-Alt-Super-Shift-k: { launch: ["ghostty"] }  # Terminal
      Shift-Ctrl-Alt-Super-Shift-h: { launch: ["thunar"] }  # File manager
      Shift-Ctrl-Alt-Super-Shift-t: { launch: ["teams"] }  # Teams
      Shift-Ctrl-Alt-Super-Shift-p: { launch: ["postman"] }  # Postman
      Shift-Ctrl-Alt-Super-Shift-v: { launch: ["code"] }  # VS Code
      Shift-Ctrl-Alt-Super-Shift-b: { launch: ["dbeaver"] }  # DBeaver
      Shift-Ctrl-Alt-Super-Shift-m: { launch: ["thunderbird"] }  # Mail

  # Hyper + w sublayer - Window management
  # Note: These assume you're using a tiling WM or have i3/sway-like keybindings
  - name: Window management
    remap:
      # Window positioning (using i3/sway style commands)
      Shift-Ctrl-Alt-Super-w-h: { launch: ["i3-msg", "move", "left"] }
      Shift-Ctrl-Alt-Super-w-l: { launch: ["i3-msg", "move", "right"] }
      Shift-Ctrl-Alt-Super-w-j: { launch: ["i3-msg", "move", "center"] }
      Shift-Ctrl-Alt-Super-w-Return: { launch: ["i3-msg", "fullscreen", "toggle"] }

      # Window sizing
      Shift-Ctrl-Alt-Super-w-equal: { launch: ["i3-msg", "resize", "grow", "width", "10", "px"] }
      Shift-Ctrl-Alt-Super-w-minus: { launch: ["i3-msg", "resize", "shrink", "width", "10", "px"] }

      # Next window (Alt+Tab equivalent)
      Shift-Ctrl-Alt-Super-w-p: Alt-Tab

  # Shortcat equivalent (using rofi or dmenu)
  - name: Shortcat launcher
    remap:
      Shift-Ctrl-Alt-Super-f: { launch: ["rofi", "-show", "drun"] }

  # German umlauts - Option + a/o/u -> ä/ö/ü
  - name: German umlauts
    remap:
      Alt-a:
        launch: ["sh", "-c", "xdotool type 'ä'"]
      Alt-Shift-a:
        launch: ["sh", "-c", "xdotool type 'Ä'"]
      Alt-o:
        launch: ["sh", "-c", "xdotool type 'ö'"]
      Alt-Shift-o:
        launch: ["sh", "-c", "xdotool type 'Ö'"]
      Alt-u:
        launch: ["sh", "-c", "xdotool type 'ü'"]
      Alt-Shift-u:
        launch: ["sh", "-c", "xdotool type 'Ü'"]

